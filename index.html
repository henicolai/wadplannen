<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WadPlanner v3 — Getij & Vaaradvies</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --ink:#0b1926;--sea:#1a3a52;--deep:#091620;--hz:#3a7a9c;
  --foam:#cfe0ea;--sand:#e6d4a8;--brass:#c49a3c;--alert:#d94f3b;
  --go:#2a9a6a;--warn:#d4812a;--card:rgba(18,44,66,.38);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Mono',monospace;background:var(--ink);color:var(--foam);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 90%,rgba(26,58,82,.7) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 90% 10%,rgba(9,22,32,.9) 0%,transparent 60%),repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(200,221,232,.012) 3px,rgba(200,221,232,.012) 4px);z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1020px;margin:0 auto;padding:0 18px 80px}

header{padding:30px 0 22px;border-bottom:1px solid rgba(200,221,232,.12);margin-bottom:28px;display:flex;align-items:flex-end;gap:14px}
.logo-icon{font-size:38px;line-height:1;filter:drop-shadow(0 0 14px rgba(196,154,60,.5));animation:bob 4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.logo-text h1{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--sand);letter-spacing:-.02em;line-height:1}
.logo-text p{font-size:.58rem;color:var(--hz);letter-spacing:.2em;text-transform:uppercase;margin-top:3px}
.ver{margin-left:auto;font-size:.57rem;letter-spacing:.12em;text-transform:uppercase;color:var(--hz);opacity:.5;border:1px solid rgba(200,221,232,.1);padding:3px 9px;border-radius:20px;white-space:nowrap}

.layout{display:grid;grid-template-columns:310px 1fr;gap:16px;align-items:start}
@media(max-width:680px){.layout{grid-template-columns:1fr}}

/* FORM */
.fp{background:var(--card);border:1px solid rgba(200,221,232,.1);border-radius:2px;padding:20px;backdrop-filter:blur(6px);position:sticky;top:16px}
.ftitle{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ftitle::after{content:'';flex:1;height:1px;background:rgba(196,154,60,.22)}
.field{margin-bottom:11px}
.field label{display:block;font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:var(--hz);margin-bottom:5px}
.field select,.field input{width:100%;background:rgba(9,22,32,.78);border:1px solid rgba(200,221,232,.11);border-radius:1px;color:var(--foam);font-family:'IBM Plex Mono',monospace;font-size:.76rem;padding:8px 10px;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;-webkit-appearance:none}
.field select:focus,.field input:focus{border-color:var(--brass);box-shadow:0 0 0 2px rgba(196,154,60,.1)}
.field select option{background:var(--deep)}
.field input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.55);cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn{width:100%;margin-top:5px;background:var(--brass);color:var(--ink);border:none;border-radius:1px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:12px;cursor:pointer;transition:all .2s}
.btn:hover{background:#d4aa4a;transform:translateY(-1px);box-shadow:0 6px 24px rgba(196,154,60,.25)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* RIGHT */
.right{display:flex;flex-direction:column;gap:14px}

/* MAP */
.map-card{background:var(--card);border:1px solid rgba(200,221,232,.1);border-radius:2px;overflow:hidden}
.map-head{padding:9px 14px;border-bottom:1px solid rgba(200,221,232,.07);display:flex;align-items:center;justify-content:space-between;gap:8px}
.map-lbl{font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--hz);white-space:nowrap}
.map-route{font-family:'Playfair Display',serif;font-size:.86rem;color:var(--sand);text-align:right}
#map{height:320px;width:100%;background:var(--deep)}

/* Leaflet dark overrides */
.leaflet-tile{filter:brightness(.58) saturate(.65) hue-rotate(190deg)}
.leaflet-control-attribution{background:rgba(9,22,32,.85)!important;color:var(--hz)!important;font-size:9px!important}
.leaflet-control-zoom a{background:rgba(18,44,66,.92)!important;color:var(--foam)!important;border-color:rgba(200,221,232,.14)!important}
.leaflet-popup-content-wrapper{background:rgba(11,25,38,.97)!important;border:1px solid rgba(200,221,232,.15)!important;border-radius:2px!important;color:var(--foam)!important;font-family:'IBM Plex Mono',monospace!important;font-size:11px!important;box-shadow:0 8px 32px rgba(0,0,0,.55)!important}
.leaflet-popup-tip{background:rgba(11,25,38,.97)!important}
.leaflet-popup-close-button{color:var(--hz)!important}

/* map legend */
.map-legend{padding:8px 14px;border-top:1px solid rgba(200,221,232,.06);display:flex;gap:16px;font-size:.55rem;color:var(--hz);letter-spacing:.08em}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-line{width:22px;height:2px}
.leg-dash{width:22px;height:2px;background:repeating-linear-gradient(90deg,var(--brass) 0,var(--brass) 5px,transparent 5px,transparent 9px)}
.leg-dot{width:10px;height:10px;border-radius:50%}

/* RESULT */
#result{display:none;animation:fu .4s ease}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:var(--hz);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;opacity:.42;gap:8px}
.ei{font-size:2rem;opacity:.25}

/* CARDS */
.card{background:var(--card);border:1px solid rgba(200,221,232,.08);border-left:3px solid var(--hz);border-radius:2px;padding:15px 17px}
.card.cg{border-left-color:var(--go)}.card.cw{border-left-color:var(--warn)}.card.ca{border-left-color:var(--alert)}.card.cb{border-left-color:var(--brass)}.card.cs{border-left-color:var(--hz)}
.clbl{font-size:.53rem;letter-spacing:.18em;text-transform:uppercase;margin-bottom:7px}
.cg .clbl{color:var(--go)}.cw .clbl{color:var(--warn)}.ca .clbl{color:var(--alert)}.cb .clbl{color:var(--brass)}.cs .clbl,.card .clbl{color:var(--hz)}
.card h3{font-family:'Playfair Display',serif;font-size:.98rem;color:var(--sand);margin-bottom:4px}
.card p{font-size:.7rem;color:var(--foam);line-height:1.7;opacity:.87}

.dbanner{padding:10px 13px;border-radius:1px;font-size:.67rem;line-height:1.6}
.dbanner.ok{background:rgba(42,154,106,.09);border:1px solid rgba(42,154,106,.26);color:#4dba88}
.dbanner.warn{background:rgba(212,129,42,.09);border:1px solid rgba(212,129,42,.26);color:var(--warn)}
.dbanner.danger{background:rgba(217,79,59,.09);border:1px solid rgba(217,79,59,.26);color:#e0705e}

.slots{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:460px){.slots{grid-template-columns:1fr}}
.slot{padding:13px;border-radius:1px;border:1px solid rgba(200,221,232,.08);background:rgba(9,22,32,.52)}
.slot.best{border-color:rgba(42,154,106,.33);background:rgba(42,154,106,.065)}
.slot.ok{border-color:rgba(212,129,42,.28);background:rgba(212,129,42,.055)}
.slot.bad{border-color:rgba(217,79,59,.22);background:rgba(217,79,59,.045);opacity:.6}
.stime{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--sand);letter-spacing:-.02em}
.slbl{font-size:.53rem;letter-spacing:.14em;text-transform:uppercase;margin:3px 0 6px}
.best .slbl{color:var(--go)}.ok .slbl{color:var(--warn)}.bad .slbl{color:var(--alert)}
.slot p{font-size:.67rem;color:var(--foam);opacity:.78;line-height:1.5}
.ssub{font-size:.57rem!important;opacity:.42!important;margin-top:4px!important}

.ttable{width:100%;border-collapse:collapse;font-size:.7rem;margin-top:7px}
.ttable th{text-align:left;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--hz);padding:5px 7px;border-bottom:1px solid rgba(200,221,232,.08)}
.ttable td{padding:6px 7px;border-bottom:1px solid rgba(200,221,232,.05);color:var(--foam)}
.ttable tr:last-child td{border-bottom:none}
.tHW{color:var(--brass);font-weight:500}.tLW{color:var(--hz)}

.spark-wrap{margin:11px 0 3px}
.spark-wrap canvas{width:100%;height:50px;display:block}
.spark-lbls{display:flex;justify-content:space-between;font-size:.51rem;color:var(--hz);opacity:.48;letter-spacing:.05em;margin-top:2px}

.badges{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.badge{font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid rgba(200,221,232,.12);color:var(--foam);opacity:.6}
.bg{border-color:rgba(42,154,106,.38);color:#4dba88;opacity:1}
.bb{border-color:rgba(196,154,60,.38);color:var(--brass);opacity:1}
.bw{border-color:rgba(212,129,42,.33);color:var(--warn);opacity:1}
.ba{border-color:rgba(217,79,59,.38);color:#e0705e;opacity:1}

.div{font-size:.53rem;letter-spacing:.18em;text-transform:uppercase;color:var(--hz);margin:16px 0 11px;display:flex;align-items:center;gap:8px}
.div::before,.div::after{content:'';flex:1;height:1px;background:rgba(200,221,232,.08)}

.rtop{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.rtitle{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--sand)}
.rmeta{font-size:.57rem;color:var(--hz);letter-spacing:.08em;text-transform:uppercase}
.rdist .nm{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--brass)}
.rdist .eta{font-size:.57rem;color:var(--hz);letter-spacing:.1em;text-transform:uppercase;text-align:right}

.steps{list-style:none;padding:0;margin:6px 0 0}
.steps li{font-size:.67rem;color:var(--foam);opacity:.82;line-height:1.55;padding:3px 0 3px 13px;position:relative}
.steps li::before{content:'→';position:absolute;left:0;color:var(--brass);opacity:.65}

#loading{display:none;text-align:center;padding:34px;font-size:.7rem;color:var(--hz);letter-spacing:.1em}
.wd span{display:inline-block;animation:wd 1.1s ease-in-out infinite}
.wd span:nth-child(2){animation-delay:.15s}.wd span:nth-child(3){animation-delay:.3s}
@keyframes wd{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-7px);opacity:1}}

.disc{margin-top:20px;padding:11px 13px;background:rgba(9,22,32,.5);border:1px solid rgba(200,221,232,.07);border-radius:1px;font-size:.6rem;color:var(--hz);line-height:1.65}
.disc strong{color:var(--warn)}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo-icon">⚓</div>
  <div class="logo-text">
    <h1>WadPlanner</h1>
    <p>Getij &amp; Vaaradvies · Waddenzee</p>
  </div>
  <div class="ver">v3 · Echte Geulen · Mrt–Jun 2026</div>
</header>

<div class="layout">

  <!-- FORM -->
  <div class="fp">
    <div class="ftitle">Vaarplanning</div>
    <div class="field">
      <label>Vertrekhaven</label>
      <select id="van">
        <optgroup label="Vasteland">
          <option value="den_helder">Den Helder</option>
          <option value="kornwerderzand">Kornwerderzand</option>
          <option value="harlingen" selected>Harlingen</option>
          <option value="holwerd">Holwerd</option>
          <option value="lauwersoog">Lauwersoog</option>
          <option value="delfzijl">Delfzijl</option>
        </optgroup>
        <optgroup label="Eilanden">
          <option value="oudeschild">Oudeschild (Texel)</option>
          <option value="vlieland_h">Vlieland Haven</option>
          <option value="west_terschelling">West-Terschelling</option>
          <option value="nes_ameland">Nes (Ameland)</option>
          <option value="schiermonnikoog_h">Schiermonnikoog</option>
        </optgroup>
      </select>
    </div>
    <div class="field">
      <label>Bestemming</label>
      <select id="naar">
        <optgroup label="Eilanden">
          <option value="texel">Texel (Oudeschild)</option>
          <option value="vlieland">Vlieland</option>
          <option value="terschelling">West-Terschelling</option>
          <option value="ameland">Ameland (Nes)</option>
          <option value="schiermonnikoog">Schiermonnikoog</option>
        </optgroup>
        <optgroup label="Vasteland">
          <option value="harlingen">Harlingen</option>
          <option value="lauwersoog">Lauwersoog</option>
          <option value="den_helder">Den Helder</option>
          <option value="delfzijl">Delfzijl</option>
        </optgroup>
        <option value="borkum">Borkum (D)</option>
      </select>
    </div>
    <div class="field">
      <label>Datum</label>
      <input type="date" id="datum" min="2026-03-23" max="2026-06-30">
    </div>
    <div class="row2">
      <div class="field">
        <label>Diepgang (m)</label>
        <input type="number" id="diepgang" value="1.90" min="0.4" max="3.5" step="0.05">
      </div>
      <div class="field">
        <label>Snelheid (kn)</label>
        <input type="number" id="snelheid" value="5" min="2" max="14" step="0.5">
      </div>
    </div>
    <button class="btn" id="btnPlan" onclick="planTrip()">▶&nbsp; Bereken vaaradvies</button>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="map-card">
      <div class="map-head">
        <span class="map-lbl">⚓ Vaarkaart · Echte geulen</span>
        <span class="map-route" id="mapLbl">—</span>
      </div>
      <div id="map"></div>
      <div class="map-legend">
        <div class="leg-item"><div class="leg-dash"></div><span>Vaarroute</span></div>
        <div class="leg-item"><div class="leg-line" style="background:rgba(58,122,156,.7)"></div><span>Geulverloop</span></div>
        <div class="leg-item"><div class="leg-dot" style="background:#2a9a6a;border:2px solid #0b1926"></div><span>Vertrek</span></div>
        <div class="leg-item"><div class="leg-dot" style="background:#c49a3c;border:2px solid #0b1926"></div><span>Bestemming</span></div>
        <div class="leg-item"><div class="leg-dot" style="background:rgba(58,122,156,.6);width:8px;height:8px"></div><span>Waypoint</span></div>
      </div>
    </div>

    <div id="loading"><div class="wd"><span>●</span><span>●</span><span>●</span></div><div style="margin-top:10px">Berekenen…</div></div>

    <div id="result">
      <div class="empty"><div class="ei">🗺</div><div>Kies haven, bestemming &amp; datum</div></div>
    </div>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// ECHTE VAARGEUL-COÖRDINATEN
// Gebaseerd op RWS officiele vaarwegkaarten Waddenzee West & Oost
// [lat, lon] waypoints langs de werkelijke geulen
// ═══════════════════════════════════════════════════════════════════
const GEULEN = {

  // ── Harlingen haven → Blauwe Slenk → Vliestroom
  harlingen_vliestroom: [
    [53.175, 5.412],   // Harlingen haven
    [53.188, 5.395],   // Pollendam begin
    [53.200, 5.375],   // Blauwe Slenk zuideinde
    [53.218, 5.343],   // Blauwe Slenk midden
    [53.240, 5.310],   // Blauwe Slenk nordeinde / Vliestroom aansluiting
    [53.268, 5.270],   // Vliestroom
  ],

  // ── Vliestroom → West Meep → Slenk → Terschelling
  vliestroom_terschelling: [
    [53.268, 5.270],   // Vliestroom
    [53.285, 5.255],   // Vliestroom noord
    [53.300, 5.250],   // West Meep zuideinde
    [53.318, 5.228],   // West Meep
    [53.332, 5.228],   // Slenk begin
    [53.342, 5.220],   // Slenk midden
    [53.352, 5.218],   // Slenk / Schuitengat
    [53.358, 5.222],   // West-Terschelling haven
  ],

  // ── Vliestroom → zeegat naar buiten → Vliesloot → Vlieland
  vliestroom_vlieland: [
    [53.268, 5.270],
    [53.285, 5.200],   // richting zeegat tussen Vlieland & Terschelling
    [53.300, 5.150],   // zeegat drempel
    [53.305, 5.110],   // Vliesloot begin (Noordzee kant)
    [53.302, 5.092],   // Vliesloot
    [53.298, 5.084],   // Vlieland haven
  ],

  // ── Den Helder → Schulpengat → Noordzee → Vliesloot → Vlieland
  denhelder_vlieland_buiten: [
    [52.964, 4.745],   // Den Helder haven
    [52.952, 4.755],   // Marsdiep uitgang
    [52.940, 4.762],   // Schulpengat
    [52.960, 4.800],   // Schulpengat NW
    [53.000, 4.900],   // Noordzee kust
    [53.060, 5.000],   // Langs Texel noordpunt
    [53.110, 5.020],   // Eierlandse Gat zuiden
    [53.180, 5.040],   // Langs Vlieland zuidkust
    [53.250, 5.040],   // Vliehors punt
    [53.285, 5.055],   // Vliesloot Noordzee kant
    [53.302, 5.084],   // Vlieland haven
  ],

  // ── Den Helder → Schulpengat → Noordzee → Vliestroom → Terschelling
  denhelder_terschelling_buiten: [
    [52.964, 4.745],
    [52.952, 4.755],
    [52.940, 4.762],
    [52.960, 4.800],
    [53.010, 4.920],
    [53.070, 5.020],
    [53.140, 5.050],
    [53.200, 5.080],
    [53.250, 5.100],   // Noord Vlieland
    [53.290, 5.140],   // Vliestroom ingang Noordzee
    [53.310, 5.180],   // Vliestroom
    [53.340, 5.210],   // Schuitengat
    [53.358, 5.222],   // Terschelling haven
  ],

  // ── Den Helder → Marsdiep → Oudeschild Texel
  denhelder_texel: [
    [52.964, 4.745],
    [52.980, 4.790],   // Marsdiep
    [53.010, 4.820],   // Texelstroom
    [53.035, 4.840],   // Molengat
    [53.043, 4.856],   // Oudeschild
  ],

  // ── Harlingen → Vliestroom → Noordzee → Westgat Ameland → Nes
  harlingen_ameland_buiten: [
    [53.175, 5.412],
    [53.188, 5.395],
    [53.210, 5.355],   // Blauwe Slenk
    [53.245, 5.305],
    [53.268, 5.270],   // Vliestroom
    [53.290, 5.240],   // Vliestroom uitgang richting zee
    [53.320, 5.200],   // Noordzee
    [53.380, 5.300],   // Langs Terschelling noordkant
    [53.440, 5.450],   // Richting Ameland Westgat
    [53.462, 5.550],   // Westgat Ameland
    [53.458, 5.630],   // Westgat ingang
    [53.452, 5.680],   // Molengat begin
    [53.448, 5.720],   // Molengat
    [53.440, 5.760],   // Reegeul begin
    [53.435, 5.778],   // Reegeul
    [53.431, 5.782],   // Nes haven
  ],

  // ── Holwerd → veerbootgeul → Nes Ameland
  holwerd_ameland: [
    [53.400, 5.893],   // Holwerd veerdam
    [53.408, 5.876],
    [53.415, 5.855],
    [53.420, 5.840],
    [53.425, 5.820],
    [53.428, 5.800],
    [53.431, 5.782],   // Nes haven
  ],

  // ── Lauwersoog → Wierumerwad → Pinkewad → Zuiderspruit → Nes Ameland
  lauwersoog_ameland: [
    [53.407, 6.198],   // Lauwersoog
    [53.415, 6.150],   // Zoutkamperlaag
    [53.425, 6.090],   // Paesensrede
    [53.432, 6.030],   // Wierumerwad (wantij!)
    [53.438, 5.975],
    [53.442, 5.920],   // Pinkewad (wantij!)
    [53.445, 5.875],
    [53.442, 5.840],   // Zuiderspruit
    [53.438, 5.810],
    [53.435, 5.790],   // Reegeul
    [53.431, 5.782],   // Nes
  ],

  // ── Lauwersoog → Schiermonnikoog
  lauwersoog_schiermonnikoog: [
    [53.407, 6.198],
    [53.420, 6.175],   // Zoutkamperlaag
    [53.445, 6.170],   // Geul van Brakzand
    [53.465, 6.160],   // Siegewal
    [53.481, 6.165],   // Schiermonnikoog haven
  ],

  // ── Kornwerderzand → Boontjes → Vliestroom → West Meep → Terschelling
  kornwerderzand_terschelling: [
    [53.079, 5.333],   // Kornwerderzand
    [53.098, 5.345],   // Boontjes begin
    [53.120, 5.360],   // Boontjes midden
    [53.142, 5.372],   // Pollendam / Harlingen geul

// ── LEAFLET ─────────────────────────────────────────────────────
let map, layers=[];

function clearLayers(){layers.forEach(l=>map.removeLayer(l));layers=[]}

function initMap(){
  map=L.map('map',{center:[53.22,5.5],zoom:7,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:14}).addTo(map);
  // Alle havens licht weergeven
  Object.entries(HAVENS).forEach(([k,ll])=>{
    if(['texel','vlieland','terschelling','ameland','schiermonnikoog'].includes(k)) return;
    const nm=k.replace(/_h$/,'').replace(/_/g,' ');
    const m=L.circleMarker(ll,{radius:3.5,color:'#3a7a9c',fillColor:'#0d2035',fillOpacity:.9,weight:1.5,opacity:.5}).addTo(map);
    m.bindTooltip(nm,{permanent:false,direction:'top',className:'leaflet-dark-tooltip'});
    layers.push(m);
  });
}

function drawRoute(vanKey,naarKey){
  clearLayers();
  const key=`${vanKey}-${naarKey}`;
  const geulKeys=ROUTE_GEULEN[key];
  const vc=HAVENS[vanKey];
  const nc=HAVENS[naarKey];

  // Achtergrond: alle havens
  Object.entries(HAVENS).forEach(([k,ll])=>{
    if(['texel','vlieland','terschelling','ameland','schiermonnikoog'].includes(k)) return;
    const nm=k.replace(/_h$/,'').replace(/_/g,' ');
    const m=L.circleMarker(ll,{radius:3.5,color:'#3a7a9c',fillColor:'#0d2035',fillOpacity:.9,weight:1.5,opacity:.4}).addTo(map);
    m.bindTooltip(nm,{permanent:false,direction:'top'});
    layers.push(m);
  });

  if(!geulKeys||!vc||!nc){
    // Fallback: rechte stippellijn
    if(vc&&nc){
      const l=L.polyline([vc,nc],{color:'#c49a3c',weight:2,opacity:.6,dashArray:'8,7'}).addTo(map);
      layers.push(l);
      map.fitBounds(l.getBounds(),{padding:[40,40]});
    }
    document.getElementById('mapLbl').textContent=R[key]?R[key].naam:`${vanKey} → ${naarKey}`;
    return;
  }

  // Verzamel alle punten voor fitBounds
  let allPts=[];

  geulKeys.forEach((gk,gi)=>{
    const pts=GEULEN[gk];
    if(!pts) return;
    allPts=[...allPts,...pts];

    // Lichte achtergrond geullijn (blauw)
    const bgLine=L.polyline(pts,{color:'rgba(58,122,156,0.35)',weight:4,opacity:1,lineCap:'round',lineJoin:'round'}).addTo(map);
    layers.push(bgLine);

    // Gouden stippel route lijn
    const routeLine=L.polyline(pts,{color:'#c49a3c',weight:2.2,opacity:.9,dashArray:'9,6',lineCap:'round'}).addTo(map);
    layers.push(routeLine);

    // Tussentijdse waypoint-markers (niet begin/eind)
    pts.forEach((pt,i)=>{
      if(i===0||i===pts.length-1) return;
      if(i%3!==0) return; // elke 3e punt
      const m=L.circleMarker(pt,{radius:2.5,color:'rgba(58,122,156,0.7)',fillColor:'rgba(58,122,156,0.5)',fillOpacity:1,weight:1,opacity:.7}).addTo(map);
      layers.push(m);
    });
  });

  // Kritieke punten markers
  const kp=KRITIEKE_PUNTEN[key];
  if(kp) kp.forEach(([lat,lon,txt])=>{
    const icon=L.divIcon({html:`<div style="background:#d94f3b;border:2px solid #0b1926;border-radius:50%;width:10px;height:10px;box-shadow:0 0 8px rgba(217,79,59,.7)"></div>`,iconSize:[10,10],iconAnchor:[5,5],className:''});
    const m=L.marker([lat,lon],{icon}).addTo(map);
    m.bindPopup(`<strong style="color:#e0705e">⚑ Let op</strong><br>${txt}`);
    layers.push(m);
  });

  // Vertrek-marker (groen)
  const iconV=L.divIcon({html:`<div style="background:#2a9a6a;border:2.5px solid #0b1926;border-radius:50%;width:13px;height:13px;box-shadow:0 0 10px rgba(42,154,106,.7)"></div>`,iconSize:[13,13],iconAnchor:[6,6],className:''});
  const mv=L.marker(vc,{icon:iconV}).addTo(map);
  mv.bindPopup(`<strong style="color:#4dba88">Vertrek</strong><br>${vanKey.replace(/_h$/,'').replace(/_/g,' ')}`);
  layers.push(mv);

  // Bestemming-marker (goud)
  const iconN=L.divIcon({html:`<div style="background:#c49a3c;border:2.5px solid #0b1926;border-radius:50%;width:15px;height:15px;box-shadow:0 0 12px rgba(196,154,60,.8)"></div>`,iconSize:[15,15],iconAnchor:[7,7],className:''});
  const mn=L.marker(nc,{icon:iconN}).addTo(map);
  mn.bindPopup(`<strong style="color:#c49a3c">Bestemming</strong><br>${naarKey.replace(/_/g,' ')}`);
  layers.push(mn);

  // Zoom op route
  if(allPts.length>1){
    const bounds=L.latLngBounds(allPts);
    map.fitBounds(bounds,{padding:[35,35]});
  }

  const route=R[key];
  document.getElementById('mapLbl').textContent=route?route.naam:`${vanKey} → ${naarKey}`;
}

// ── HELPERS ─────────────────────────────────────────────────────
const tm=m=>{m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')};
const t2m=s=>{if(!s)return 0;const[h,mi]=s.split(':').map(Number);return h*60+(mi||0)};
function fmtD(s){const d=new Date(s),dg=['zo','ma','di','wo','do','vr','za'],mn=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];return`${dg[d.getDay()]} ${d.getDate()} ${mn[d.getMonth()]} ${d.getFullYear()}`}
function getTides(ds,lk){const raw=TD[ds];if(!raw)return null;const off=OFF[lk]||0;return raw.map(t=>({type:t.h>0?'HW':'LW',time:t.t,min:t2m(t.t)+off,h:t.h})).sort((a,b)=>a.min-b.min)}

// ── SPARKLINE ───────────────────────────────────────────────────
function spark(id,tides,slots){
  const c=document.getElementById(id);if(!c)return;
  const dpr=window.devicePixelRatio||1,w=c.offsetWidth,h=c.offsetHeight||50;
  c.width=w*dpr;c.height=h*dpr;const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  const pts=[];
  for(let i=0;i<=240;i++){
    const t=(i/240)*1440;let v=0;
    tides.forEach((tide,idx)=>{const nx=tides[idx+1];if(!nx)return;if(t>=tide.min&&t<=nx.min){const f=(t-tide.min)/(nx.min-tide.min);v=tide.h+(nx.h-tide.h)*(1-Math.cos(f*Math.PI))/2}});
    pts.push({x:t,y:v});
  }
  const minH=Math.min(...pts.map(p=>p.y))-8,maxH=Math.max(...pts.map(p=>p.y))+8,rng=maxH-minH;
  const px=t=>(t/1440)*w,py=v=>h-((v-minH)/rng)*h*.84-h*.06;
  ctx.beginPath();ctx.moveTo(px(pts[0].x),h);
  pts.forEach(p=>ctx.lineTo(px(p.x),py(p.y)));
  ctx.lineTo(px(pts[pts.length-1].x),h);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'rgba(58,122,156,.3)');g.addColorStop(1,'rgba(58,122,156,.04)');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(px(p.x),py(p.y)):ctx.moveTo(px(p.x),py(p.y)));
  ctx.strokeStyle='#3a7a9c';ctx.lineWidth=1.5;ctx.stroke();
  const y0=py(0);ctx.beginPath();ctx.moveTo(0,y0);ctx.lineTo(w,y0);
  ctx.strokeStyle='rgba(200,221,232,.1)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  tides.forEach(t=>{const x=px(t.min),y=py(t.h);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=t.type==='HW'?'#c49a3c':'#3a7a9c';ctx.fill()});
  if(slots)slots.filter(s=>s.kw!=='bad').forEach(s=>{
    ctx.beginPath();ctx.moveTo(px(s.vmin),0);ctx.lineTo(px(s.vmin),h);
    ctx.strokeStyle=s.kw==='best'?'rgba(42,154,106,.65)':'rgba(212,129,42,.55)';ctx.lineWidth=1.5;ctx.stroke();
  });
}

// ── PLAN TRIP ───────────────────────────────────────────────────
function planTrip(){
  const van=document.getElementById('van').value;
  const naar=document.getElementById('naar').value;
  const datum=document.getElementById('datum').value;
  const dg=parseFloat(document.getElementById('diepgang').value);
  const kn=parseFloat(document.getElementById('snelheid').value);
  if(!datum){alert('Kies een datum');return}
  document.getElementById('btnPlan').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('result').style.display='none';
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    document.getElementById('btnPlan').disabled=false;
    render(van,naar,datum,dg,kn);
  },600);
}

function render(van,naar,datum,dg,kn){
  const key=`${van}-${naar}`;
  const route=R[key];
  const tides=getTides(datum,van);
  const el=document.getElementById('result');
  el.style.display='block';

  drawRoute(van,naar);

  if(!route){el.innerHTML=`<div class="card ca"><div class="clbl">Route niet beschikbaar</div><h3>Niet in database</h3><p>${van.replace(/_/g,' ')} → ${naar.replace(/_/g,' ')} is nog niet opgenomen.</p></div>`;return}
  if(!tides){el.innerHTML=`<div class="card cw"><div class="clbl">Geen data</div><h3>Datum buiten bereik</h3><p>Getijdata beschikbaar 23 maart – 30 juni 2026.</p></div>`;return}

  const vtMin=Math.round((route.afstand/kn)*60);
  const etaStr=`${Math.floor(vtMin/60)}u${vtMin%60?vtMin%60+'min':''}`;

  let ds='ok',dm=`✓ Diepgang ${dg}m — geen beperkingen.`;
  if(route.wmax&&dg>route.wmax){ds='danger';dm=`✗ Diepgang ${dg}m overschrijdt wantijmax ${route.wmax}m. ${route.type==='buiten'?'Buitenom is de enige optie.':'Kies alternatieve route.'}`}
  else if(route.wdg<99&&dg>route.wdg){ds='warn';dm=`⚠ Diepgang ${dg}m is aan de limiet (max ${route.wdg}m). Controleer actuele dieptes via nautin.nl`}

  const hws=tides.filter(t=>t.type==='HW');
  const slots=[];
  hws.forEach(hw=>{
    let vm=hw.min+route.voff;if(vm<0)vm+=1440;if(vm>=1440)vm-=1440;
    const am=vm+vtMin;
    const night=vm<330||vm>1320,late=vm>1140&&!night;
    const kw=night?'bad':late?'ok':'best',lbl=night?'✕ Nacht':late?'◈ Laat':'✦ Optimaal';
    slots.push({vmin:vm,amin:am,hwt:hw.time,kw,lbl});
  });

  const sH=slots.length?slots.map(s=>`<div class="slot ${s.kw}"><div class="stime">${tm(s.vmin)}</div><div class="slbl">${s.lbl}</div><p>Aankomst ~${tm(s.amin)}</p><p class="ssub">Na HW ${s.hwt} + ${Math.abs(route.voff)}min</p></div>`).join(''):`<div class="slot bad"><div class="slbl">Geen slots</div><p>Probeer andere datum.</p></div>`;
  const tH=tides.map(t=>`<tr><td class="t${t.type}">${t.type}</td><td>${tm(t.min)}</td><td>${Math.abs(t.h)}cm ${t.h>0?'↑':'↓'} NAP</td></tr>`).join('');
  const stH=route.desc.map(s=>`<li>${s}</li>`).join('');
  const tipH=route.tips.map(t=>`<li>${t}</li>`).join('');

  const rtB=route.type==='buiten'?`<span class="badge bb">Buitenom · Noordzee</span>`:route.type==='wad'?`<span class="badge bg">Waddenzee · Binnen</span>`:`<span class="badge bw">Wad + Zeegat</span>`;
  const dgB=ds==='danger'?`<span class="badge ba">⚠ Diepgang kritiek</span>`:ds==='warn'?`<span class="badge bw">⚠ Diepgang let op</span>`:`<span class="badge bg">✓ Diepgang OK</span>`;

  el.innerHTML=`
    <div class="rtop">
      <div><div class="rmeta">${fmtD(datum)}</div><div class="rtitle">${route.naam}</div></div>
      <div class="rdist"><div class="nm">${route.afstand} nm</div><div class="eta">~${etaStr} @ ${kn}kn</div></div>
    </div>
    <div class="badges">${rtB}${dgB}<span class="badge">${route.marf}</span></div>
    <div class="dbanner ${ds}">${dm}</div>
    <div class="div">Vertrektijden</div>
    <div class="slots">${sH}</div>
    <div class="div">Getijcurve · ${van.replace(/_/g,' ')}</div>
    <div class="card cs">
      <div class="clbl">Hoog- & laagwater</div>
      <div class="spark-wrap"><canvas id="sc" style="height:50px"></canvas></div>
      <div class="spark-lbls"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span></div>
      <table class="ttable" style="margin-top:11px"><thead><tr><th>Type</th><th>Tijd</th><th>Waterstand</th></tr></thead><tbody>${tH}</tbody></table>
    </div>
    <div class="div">Vaarroute</div>
    <div class="card cb"><div class="clbl">Route waypoints</div><ul class="steps">${stH}</ul><p style="margin-top:10px;color:var(--warn);font-size:.67rem">⚑ ${route.kritiek}</p></div>
    <div class="div">Tips & aandachtspunten</div>
    <div class="card cg"><div class="clbl">Vaaradviezen</div><ul class="steps">${tipH}</ul></div>
    <div class="disc"><strong>⚠ Disclaimer:</strong> Astronomische getijden RWS 2026. Vaargeulcoördinaten zijn indicatief — gebruik altijd actuele zeekaarten (RWS 1811.1–1811.4). Controleer dieptes via <strong>nautin.nl</strong> en <strong>waddendata.nl</strong>.</div>`;

  requestAnimationFrame(()=>spark('sc',tides,slots));
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── INIT ────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  const today=new Date().toISOString().split('T')[0];
  const d=today<'2026-03-23'?'2026-03-23':today>'2026-06-30'?'2026-06-30':today;
  document.getElementById('datum').value=d;
  initMap();
  const upd=()=>drawRoute(document.getElementById('van').value,document.getElementById('naar').value);
  document.getElementById('van').addEventListener('change',upd);
  document.getElementById('naar').addEventListener('change',upd);
  upd();
});
</script>
</body>
</html>
